server:
  port: ${SERVER_PORT:7008}
spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  datasource:
    druid:
      stat-view-servlet:
        enabled: true
        loginUsername: ${DRUID_LOGIN_USERNAME}
        loginPassword: ${DRUID_LOGIN_PASSWORD}
        allow:
      web-stat-filter:
        enabled: true
    dynamic:
      druid: # 全局druid参数，绝大部分值和默认保持一致。(现已支持的参数如下,不清楚含义不要乱设置)
        # 连接池的配置信息
        # 初始化大小，最小，最大
        initial-size: 5
        min-idle: 5
        maxActive: 1000
        # 配置获取连接等待超时的时间
        maxWait: 60000
        # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
        timeBetweenEvictionRunsMillis: 60000
        # 配置一个连接在池中最小生存的时间，单位是毫秒
        minEvictableIdleTimeMillis: 300000
        #        validationQuery: SELECT 1
        testWhileIdle: true
        testOnBorrow: false
        testOnReturn: false
        # 打开PSCache，并且指定每个连接上PSCache的大小
        poolPreparedStatements: true
        maxPoolPreparedStatementPerConnectionSize: 20
        # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
        # !!!!!mysql
        #        filters: stat,slf4j,wall
        # !!!!!DM
        filters: stat,slf4j
        # 允许SELECT语句的WHERE子句是一个永真条件
        #        wall:
        #          selectWhereAlwayTrueCheck: false
        # 打开mergeSql功能；慢SQL记录
        stat:
          merge-sql: true
          slow-sql-millis: 5000
      datasource:
        master:
          ## !!!!!MYSQL
          url: ${MYSQL_URL}
          username: ${MYSQL_USERNAME}
          password: ${MYSQL_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    database: ${REDIS_DATABASE}
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    password: ${REDIS_PASSWORD}

jeecg:
  # local|minio|alioss
  # Cloudflare R2建议使用 minio 兼容模式
  uploadType: ${UPLOAD_TYPE:minio}
  minio:
    minio_url: ${R2_ENDPOINT:}
    minio_name: ${R2_ACCESS_KEY_ID:}
    minio_pass: ${R2_SECRET_ACCESS_KEY:}
    bucketName: ${R2_BUCKET_NAME:}
  # Cloudflare R2 参数模板
  cloudflareR2:
    endpoint: ${R2_ENDPOINT:}
    accessKey: ${R2_ACCESS_KEY_ID:}
    secretKey: ${R2_SECRET_ACCESS_KEY:}
    token: ${R2_TOKEN:}
    bucketName: ${R2_BUCKET_NAME:}
    publicDomain: ${R2_PUBLIC_DOMAIN:}
  ai-rag:
    embed-store:
      host: ${EMBED_STORE_HOST}
      port: ${EMBED_STORE_PORT}
      database: ${EMBED_STORE_DATABASE}
      user: ${EMBED_STORE_USER}
      password: ${EMBED_STORE_PASSWORD}
      table: ${EMBED_STORE_TABLE}

management:
  tracing:
    sampling:
      probability: ${OTEL_TRACING_SAMPLING_PROBABILITY:1.0}
  observations:
    annotations:
      enabled: ${MANAGEMENT_OBSERVATIONS_ANNOTATIONS_ENABLED:true}
    enable:
      "http.server.requests": false
      "http.client.requests": false
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE:health,info,metrics,prometheus}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:when_authorized}

otel:
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:https://lf.sztszs.top/api/public/otel}
      headers: ${OTEL_EXPORTER_OTLP_HEADERS:}
  instrumentation:
    spring-webmvc:
      enabled: false
    spring-web:
      enabled: false
